steps:
- name: "gcr.io/cloud-builders/docker" 
  args: ["build", "-t", "gcr.io/$PROJECT_ID/analog-pd-dashboard", "."]
- name: "gcr.io/google.com/cloudsdktool/cloud-sdk" 
  entrypoint: "gcloud"
  args: ["run", "deploy", "analog-pd-dashboard", "--image", "gcr.io/$PROJECT_ID/analog-pd-dashboard", "--region", "us-central1", "--platform", "managed", "--allow-unauthenticated"]

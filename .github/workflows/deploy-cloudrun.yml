name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: st-china-ai-force
  REGION: asia-east1
  SERVICE: mcu-regional-competitor-dashboard
  IMAGE: asia-east1-docker.pkg.dev/st-china-ai-force/mcu/mcu-regional-competitor-dashboard

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Require GCP_SA_KEY secret
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "::error::Missing repository secret GCP_SA_KEY. Deploy from Cloud Shell instead: git checkout main && git pull && bash deploy.sh"
            echo "See docs/DEPLOY_CLOUD_RUN.md"
            exit 1
          fi

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: gcloud builds submit --project "${PROJECT_ID}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "GCP_PROJECT=${PROJECT_ID},BQ_DATASET=mcu,GCS_BUCKET=st-finance-reports,AUTH_EMAIL_DOMAIN=@st.com" \
            --set-secrets "VITE_DEEPSEEK_API_KEY=VITE_DEEPSEEK_API_KEY:latest,FLASK_SECRET_KEY=FLASK_SECRET_KEY:latest" \
            --project "${PROJECT_ID}"

      - name: Print service URL
        run: |
          gcloud run services describe "${SERVICE}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --format='value(status.url)'
